# DISABLED — Sherwoods Gallery moved to Vercel (auto-deploys via GitHub
# integration in the Vercel dashboard). This workflow is kept as a reference
# in case we ever revive an xCloud deploy. The push trigger has been removed
# so it no longer fires automatically. To run it manually, trigger via the
# Actions tab → "Deploy to xCloud (disabled)" → Run workflow.

name: Deploy to xCloud (disabled)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.XCLOUD_HOST }}
          username: ${{ secrets.XCLOUD_USER }}
          key: ${{ secrets.XCLOUD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/sherwoods-gallery
            git fetch --quiet
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 reload sherwoods --update-env
            echo "✓ Deploy complete: $(git rev-parse --short HEAD)"
