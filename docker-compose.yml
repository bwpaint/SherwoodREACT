services:
  postgres:
    image: postgres:16-alpine
    container_name: sherwoods-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sherwoods
      POSTGRES_PASSWORD: sherwoods_dev_pw
      POSTGRES_DB: sherwoods_gallery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherwoods -d sherwoods_gallery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
