# nginx config for sherwoodsgallery.com
# Place at: /etc/nginx/sites-available/sherwoodsgallery
# Symlink to: /etc/nginx/sites-enabled/sherwoodsgallery
# After certbot runs, this file will be edited to add SSL config — leave that as-is.

server {
    listen 80;
    listen [::]:80;
    server_name sherwoodsgallery.com www.sherwoodsgallery.com;

    # certbot will rewrite to listen on 443 with SSL after `certbot --nginx`.

    # Standard security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Increase max upload size for media uploads through Payload admin
    client_max_body_size 25M;

    # Serve uploaded media directly from disk, bypassing Node
    location /media/ {
        alias /var/www/sherwoods-gallery/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve Next.js _next/static assets with long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
